{% extends 'index.html' %}

{% block navbar %}
<li><a href="{{url_for('home')}}" class="active">Home</a></li>
<li><a href="{{url_for('about')}}">About</a></li>
<li><a href="{{url_for('prediction')}}">Prediction</a></li>
<li><a href="{{url_for('graph')}}">Graph</a></li>
<li><a href="{{url_for('index')}}">Logout</a></li>  
{% endblock %}

{% block content %}
<main class="main" style="background-color:#0f172a;">

    <!-- Video Background Section -->
    <section id="hero" class="hero section" style="position:relative; height:100vh; overflow:hidden; background-color:black;">
        <video autoplay muted loop playsinline 
            style="width:100%; height:100%; object-fit:cover; position:absolute; top:0; left:0; z-index:-1;">
            <source src="/static/img/background.mp4" type="video/mp4">
        </video>

        <!-- Prediction Card -->
        <div 
            style="
                position:relative; 
                max-width:700px; 
                margin:80px auto; 
                padding:40px; 
                border-radius:20px; 
                background:rgba(15,23,42,0.65); 
                backdrop-filter:blur(12px); 
                border:1px solid rgba(56,189,248,0.35); 
                color:#e2e8f0; 
                box-shadow:0 15px 50px rgba(0,0,0,0.7); 
                transition:all 0.4s ease;
            "
            onmouseover="this.style.transform='translateY(-10px) scale(1.03)'; this.style.boxShadow='0 25px 60px rgba(0,0,0,0.85)'; this.style.borderColor='#38bdf8';"
            onmouseout="this.style.transform='translateY(0) scale(1)'; this.style.boxShadow='0 15px 50px rgba(0,0,0,0.7)'; this.style.borderColor='rgba(56,189,248,0.35)';"
        >
            <h2 style="
                font-size:36px; 
                font-weight:700; 
                color:#ffffff; 
                text-align:center; 
                margin-bottom:30px; 
                text-shadow:0 0 15px #38bdf8;
            ">
                Brain Hemorrhage Prediction
            </h2>

            {% if prediction %}
                <h3 style="color:#38bdf8; text-align:center; margin-bottom:20px;">Result: {{prediction}}</h3>
                <div style="text-align:center; margin-bottom:20px;">
                    <img src="/static/saved_images/{{file_name}}" height="200px" style="border-radius:12px; box-shadow:0 10px 35px rgba(0,0,0,0.6);">
                </div>
            {% endif %}

            <!-- Upload Form -->
            <form action="{{url_for('prediction')}}" method="post" class="php-email-form" enctype="multipart/form-data"
                style="display:flex; flex-direction:column; gap:20px; align-items:center;"
            >
                <h3 style="color:#38bdf8; font-weight:600;">Upload Brain Scan Image</h3>
                <input type="file" name="file" required 
                    style="width:100%; padding:12px; border-radius:12px; border:1px solid rgba(56,189,248,0.35); background:rgba(15,23,42,0.45); color:#e2e8f0; font-size:16px; transition:0.3s;"
                    onfocus="this.style.borderColor='#38bdf8';" 
                    onblur="this.style.borderColor='rgba(56,189,248,0.35)';"
                >
                <button type="submit" 
                    style="
                        width:100%; 
                        padding:12px; 
                        border:none; 
                        border-radius:30px; 
                        font-size:16px; 
                        font-weight:600; 
                        background:linear-gradient(45deg,#38bdf8,#0ea5e9); 
                        color:white; 
                        cursor:pointer; 
                        transition:0.3s; 
                        box-shadow:0 8px 20px rgba(0,0,0,0.3);
                    "
                    onmouseover="this.style.transform='translateY(-3px)'; this.style.boxShadow='0 12px 25px rgba(0,0,0,0.4)';"
                    onmouseout="this.style.transform='translateY(0)'; this.style.boxShadow='0 8px 20px rgba(0,0,0,0.3)';"
                >
                    Submit
                </button>
            </form>

        </div>
    </section>

</main>
{% endblock %}
